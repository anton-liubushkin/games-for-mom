<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>Mahjong Classic</title>
  <meta name="description" content="Классический маджонг-солитер: убирай одинаковые свободные фишки из многослойных раскладок. Играет офлайн." />

  <meta name="theme-color" content="#0f1226" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mahjong Classic" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="btn-new" id="btn-new">Новая игра</button>
      <div class="stats" aria-live="polite">
        <span id="level-name">Раскладка</span>
        <span><b id="moves">0</b> <span id="moves-word">ходов</span></span>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" id="btn-undo" title="Отменить ход" aria-label="Отменить ход" disabled>↶</button>
        <button class="icon-btn" id="btn-hint" title="Подсказка" aria-label="Подсказка">💡</button>
      </div>
    </header>

    <main class="board-wrap">
      <div class="board" id="board" aria-label="Игровое поле">
        <div class="tiles" id="tiles"></div>
      </div>

      <div class="overlay" id="overlay" hidden>
        <div class="overlay-card">
          <div class="overlay-emoji">🎉</div>
          <h2 class="overlay-title">Поле очищено!</h2>
          <p class="overlay-sub" id="overlay-sub">Отлично сыграно</p>
          <div class="overlay-actions">
            <button class="btn btn-primary" id="overlay-again">Новая игра</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="difficulty-modal" hidden>
    <div class="modal-card">
      <h2 class="modal-title">Новая игра</h2>
      <div class="diff-list" id="diff-list"></div>
    </div>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
