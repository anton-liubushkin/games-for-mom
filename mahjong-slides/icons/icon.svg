<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b2350"/>
      <stop offset="1" stop-color="#0b0e1f"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7ecff"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#b388ff"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- motion trail: where the tile slid from -->
  <g>
    <rect x="60" y="146" width="40" height="220" rx="20" fill="url(#glow)" opacity="0.22"/>
    <rect x="108" y="146" width="40" height="220" rx="20" fill="url(#glow)" opacity="0.4"/>
  </g>

  <!-- tile -->
  <rect x="150" y="126" width="244" height="280" rx="40" fill="#0a0d1c" opacity="0.35"/>
  <rect x="150" y="116" width="244" height="280" rx="40" fill="url(#tile)"/>
  <rect x="150" y="116" width="244" height="280" rx="40" fill="none" stroke="url(#glow)" stroke-width="6" opacity="0.7"/>

  <!-- red dragon "中" drawn as vector shapes (font-independent) -->
  <g fill="#e23b3b">
    <rect x="207" y="204" width="130" height="104" rx="10" fill="none" stroke="#e23b3b" stroke-width="24"/>
    <rect x="259" y="160" width="26" height="192" rx="8"/>
  </g>
</svg>
